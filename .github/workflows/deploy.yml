name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the project folder (ensure it exists)
            cd /home/ubuntu/ci-cd-demo
            
            git pull
            docker compose down
            docker compose up --build -d
